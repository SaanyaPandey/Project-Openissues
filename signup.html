<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>OpenIssue | Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#a3a6ff",
                        "primary-dim": "#6063ee",
                        "secondary": "#a28efc",
                        "tertiary": "#ffa5d9",
                        "error": "#ff6e84",
                        "surface": "#0a0e19",
                        "surface-variant": "#202535",
                        "surface-container-low": "#0f131f",
                        "surface-container-high": "#1a1f2e",
                        "surface-container-highest": "#202535",
                        "on-surface": "#e8eafb",
                        "on-surface-variant": "#a7aaba",
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk", "sans-serif"],
                        "body": ["Manrope", "sans-serif"],
                    }
                }
            }
        }
    </script>
    <link href="styles.css" rel="stylesheet" />
    <script defer src="auth.js"></script>
</head>
<body class="bg-surface text-on-surface font-body overflow-x-hidden min-h-screen flex items-center justify-center relative selection:bg-primary/30 p-4">

    <!-- Ambient Accents -->
    <div class="oracle-pulse !top-0 !-right-20 !bg-secondary/30 !opacity-30"></div>
    <div class="oracle-pulse !bottom-0 !left-0 !bg-primary/20 !opacity-40"></div>
    <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPSc0MicgaGVpZ2h0PSc0Mic+CjxyZWN0IHdpZHRoPSc0MicgaGVpZ2h0PSc0MicgZmlsbD0nbm9uZScvPgo8Y2lyY2xlIGN4PScxJyBjeT0nMScgcj0nMScgZmlsbD0nI2ZmZicgb3BhY2l0eT0nMC4wNScvPgkKPC9zdmc+')] opacity-20 pointer-events-none"></div>

    <div class="w-full max-w-md z-10 animate-[fade-in_0.5s_ease-out]">
        
        <!-- Logo -->
        <div class="flex flex-col items-center justify-center mb-6">
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center shadow-[0_0_20px_rgba(162,142,252,0.4)] mb-3">
                <span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings: 'FILL' 1;">cloud_done</span>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tighter text-indigo-400 font-headline text-white">OpenIssue</h1>
        </div>

        <!-- Auth Card -->
        <div class="glass-card rounded-[2rem] border border-white/10 p-8 shadow-[0_20px_40px_rgba(0,0,0,0.4)] relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-secondary to-tertiary"></div>
            
            <h2 class="text-2xl font-headline font-extrabold text-center mb-2 mt-2 text-white tracking-tight">Initialize Oracle</h2>
            <p class="text-sm text-on-surface text-center mb-8">Create your triage administrator profile</p>

            <div id="alert-container"></div>

            <form id="signup-form" class="space-y-4">
                
                <!-- Name Field -->
                <div>
                    <label class="block text-xs font-bold text-white uppercase tracking-wider mb-2">Full Name</label>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface text-[20px] group-focus-within:text-primary transition-colors">person</span>
                        <input id="name" type="text" required placeholder="Alex Rivera" class="w-full bg-surface-container-low border border-white/10 rounded-xl py-3 pl-12 pr-4 text-sm focus:ring-2 focus:ring-primary focus:border-primary transition-all placeholder:text-white focus:bg-surface-container-high">
                    </div>
                </div>

                <!-- Email Field -->
                <div>
                    <label class="block text-xs font-bold text-white uppercase tracking-wider mb-2">Email Address</label>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface text-[20px] group-focus-within:text-primary transition-colors">mail</span>
                        <input id="email" type="email" required placeholder="name@company.com" class="w-full bg-surface-container-low border border-white/10 rounded-xl py-3 pl-12 pr-4 text-sm focus:ring-2 focus:ring-primary focus:border-primary transition-all placeholder:text-white focus:bg-surface-container-high">
                    </div>
                </div>

                <!-- Password Field -->
                <div>
                    <label class="block text-xs font-bold text-white uppercase tracking-wider mb-2">Password</label>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface text-[20px] group-focus-within:text-primary transition-colors">lock</span>
                        <input id="password" type="password" required minlength="6" placeholder="••••••••" class="w-full bg-surface-container-low border border-white/10 rounded-xl py-3 pl-12 pr-12 text-sm focus:ring-2 focus:ring-primary focus:border-primary transition-all placeholder:text-white focus:bg-surface-container-high">
                        <button type="button" class="toggle-password absolute right-4 top-1/2 -translate-y-1/2 text-on-surface hover:text-on-surface transition-colors" data-target="password">
                            <span class="material-symbols-outlined text-[20px]">visibility_off</span>
                        </button>
                    </div>
                    <p class="text-[10px] text-on-surface mt-2 font-medium">Must be at least 6 characters.</p>
                </div>

                <!-- Terms -->
                <div class="flex items-start gap-3 pt-2 pb-2">
                    <input id="terms" type="checkbox" required class="w-4 h-4 mt-0.5 rounded border-white/20 bg-surface-container-high text-primary focus:ring-primary focus:ring-offset-0 cursor-pointer">
                    <label for="terms" class="text-xs text-white cursor-pointer select-none leading-relaxed">
                        I agree to the <a href="#" class="text-primary hover:underline">Terms of Service</a> and acknowledge the <a href="#" class="text-primary hover:underline">Privacy Policy</a>.
                    </label>
                </div>

                <!-- Submit Button -->
                <div class="pt-2">
                    <button id="signup-btn" type="submit" class="w-full py-3.5 rounded-xl bg-gradient-to-r from-primary to-secondary text-white font-bold tracking-wide shadow-[0_0_20px_rgba(162,142,252,0.3)] hover:shadow-[0_0_30px_rgba(162,142,252,0.5)] hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                        Create Account
                    </button>
                </div>
            </form>

            <div class="mt-6 pt-6 border-t border-white/5 text-center">
                <p class="text-sm text-on-surface">
                    Already have an account? 
                    <a href="login.html" class="text-primary font-bold hover:underline ml-1">Sign In</a>
                </p>
            </div>
        </div>
        
    </div>

</body>
</html>
